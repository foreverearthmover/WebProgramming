<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout Exercise</title>
    <link href="style_regular.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #333;
            line-height: 1.6;
        }

        h1 {
            display: block;
            font-size: 2em;
            margin-block-start: 0.67em;
            margin-block-end: 0.67em;
            margin-inline-start: 0px;
            margin-inline-end: 0px;
            font-weight: bold;
            unicode-bidi: isolate;
            text-align: center;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            background: rgba(255, 255, 255, 0.565);
            backdrop-filter: blur(12px);
            padding: 1.25rem 0;
        }

        .navbar .wrapper {
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 1.5rem;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #000;
        }

        .page {
            display: flex;
            flex-direction: column;
            max-width: 800px;
            align-items: center;
            margin: 3rem auto;
            min-height: 100vh;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .gallery-item {
            flex: 0 0 calc(33.333% - 1rem);
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gallery-thumb {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #c4c4c4;
        }

        .gallery-label {
            padding: 0.75rem;
            font-size: 0.85rem;
            text-align: center;
            color: #555;
            background: rgba(207, 207, 207, 0.38);
        }

        .flex-container {/* not using these, just for practice*/
            min-width: 300px;
            max-width: 800px;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;

        }

        .flex-item { /* not using these, just for practice*/
            display:flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
            background-color: #bfbfbf;
            border: 1px solid #ddd;
        }

        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1.5rem 0;
            border-top: 1px solid #ddd;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #888;
        }

        body {
            background:
                linear-gradient(
                180deg,
                #efefef,
                #ffffff
                );
            color: rgba(36, 29, 29, 0.771);
        }

    </style>
</head>

<body>
    
    <nav class="navbar">

        <div class="wrapper">
            <strong class="brand">Project Page</strong>
            <ul class="nav-links">
                <li><a href="./index.html">Home</a></li>
                <li><a href="./about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <section class="page">
        
        <header>
            <h1>Project Name</h1>
        </header>
            <p>Module: Web Programming</p>

            <em> Project Description </em>

            <br>
            <br>

                <h2>Gallery</h2>

                <br>

            <section>

                <br>

                <div class="gallery">
                    <div class="gallery-item">
                        <div class="gallery-thumb"></div>
                        <div class="gallery-label">Item 1</div>
                    </div>
                    <div class="gallery-item">
                        <div class="gallery-thumb"></div>
                        <div class="gallery-label">Item 2</div>
                    </div>
                    <div class="gallery-item">
                        <div class="gallery-thumb"></div>
                        <div class="gallery-label">Item 3</div>
                    </div>
                    <div class="gallery-item">
                        <div class="gallery-thumb"></div>
                    <div class="gallery-label">Item 4</div>
                    </div>
                    <div class="gallery-item">
                        <div class="gallery-thumb"></div>
                        <div class="gallery-label">Item 5</div>
                    </div>
                    <div class="gallery-item">
                        <div class="gallery-thumb"></div>
                        <div class="gallery-label">Item 6</div>
                    </div>
                    </div>
                </div>
            </section>

    </section>

        <footer class="wrapper">

        <div class="footer-content">
            <span>&copy; 2026 </span>
        </div>
    </footer>

</body>
</html>
